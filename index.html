<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Real BC Crash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        #graph-canvas {
            width: 100%;
            height: 280px;
            background: linear-gradient(to bottom, #18181b 0%, #09090b 100%);
            border-radius: 20px;
            border: 3px solid #27272a;
        }

        .multiplier {
            font-size: 5.5rem;
            line-height: 1;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            text-shadow: 0 0 40px currentColor;
        }

        .history-panel {
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .dot { box-shadow: 0 0 15px currentColor; }

        .countdown {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-12">
    <div class="max-w-md mx-auto bg-zinc-900 min-h-screen overflow-hidden border-x border-zinc-800 shadow-2xl relative">
        
        <!-- TOP BAR -->
        <div class="bg-black px-5 py-4 flex items-center justify-between border-b border-zinc-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-amber-500 rounded-3xl flex items-center justify-center text-3xl shadow-inner">💥</div>
                <div class="title-font text-3xl font-bold tracking-tighter">CRASH</div>
            </div>
            
            <div onclick="toggleHistory()" 
                 class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-3xl text-sm font-medium cursor-pointer active:scale-95 transition-all">
                📜 <span>HISTORY</span>
            </div>
            
            <div class="flex items-center gap-2 bg-zinc-950 rounded-3xl px-5 py-1 text-sm font-medium border border-zinc-700">
                <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
                NGN <span id="balance" class="font-mono font-bold">2,148.67</span>
            </div>
        </div>

        <!-- RECENT MULTIPLIERS -->
        <div class="px-4 py-4 bg-zinc-950 border-b border-zinc-800 overflow-x-auto">
            <div id="recent-bar" class="flex gap-6 whitespace-nowrap"></div>
        </div>

        <!-- MAIN GAME -->
        <div class="px-4 pt-5">
            <!-- GRAPH -->
            <div class="relative">
                <canvas id="graph-canvas" width="400" height="280"></canvas>
                
                <!-- LIVE MULTIPLIER -->
                <div id="multiplier-display" 
                     class="absolute top-12 left-1/2 -translate-x-1/2 text-center pointer-events-none z-10">
                    <div id="mult-value" class="multiplier text-emerald-400">1.00</div>
                    <div class="text-xs tracking-[4px] text-zinc-400 -mt-3">MULTIPLIER</div>
                </div>

                <!-- STATUS -->
                <div id="status-area" 
                     class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-black/80 px-8 py-3 rounded-3xl text-center min-w-[220px]">
                    <div id="status-text" class="font-medium text-lg">NEXT ROUND IN <span id="countdown" class="countdown text-emerald-400">5</span></div>
                    <div id="sub-status" class="text-xs text-zinc-400 mt-1">Place your bet now</div>
                </div>
            </div>

            <!-- BET PANEL -->
            <div class="mt-8 bg-zinc-950 border border-zinc-800 rounded-3xl p-6">
                <div class="flex justify-between mb-4 items-baseline">
                    <span class="text-zinc-400 text-sm">YOUR BET</span>
                    <span id="bet-amount-display" class="font-mono text-3xl font-bold">100</span>
                </div>

                <div class="grid grid-cols-4 gap-3 mb-6">
                    <button onclick="quickBet(50)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95">+50</button>
                    <button onclick="quickBet(100)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95">+100</button>
                    <button onclick="quickBet(250)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95">+250</button>
                    <button onclick="quickBet(500)" class="bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl text-sm font-medium active:scale-95">MAX</button>
                </div>

                <input id="bet-input" type="number" value="100" 
                       oninput="updateBetDisplay()" 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-5 text-center text-4xl font-bold font-mono focus:border-emerald-500 outline-none">

                <!-- ACTION BUTTON -->
                <button id="action-btn"
                        onclick="handleAction()"
                        class="mt-6 w-full py-7 text-2xl font-bold rounded-3xl transition-all active:scale-95 bg-emerald-500 text-black">
                    PLACE BET
                </button>
            </div>
        </div>

        <!-- HIDDEN HISTORY -->
        <div id="history-panel" class="history-panel hidden fixed inset-x-0 bottom-0 bg-zinc-900 border-t border-zinc-700 max-h-[65%] overflow-hidden rounded-t-3xl">
            <div class="px-6 py-5 flex justify-between border-b border-zinc-800 sticky top-0 bg-zinc-900 z-10">
                <div class="text-xl font-semibold">Round History</div>
                <button onclick="toggleHistory()" class="text-zinc-400 text-xl">✕</button>
            </div>
            
            <div class="px-6">
                <div class="grid grid-cols-12 text-[10px] font-medium text-zinc-400 py-4 border-b border-zinc-800">
                    <div class="col-span-5">GAME ID</div>
                    <div class="col-span-3 text-center">RESULT</div>
                    <div class="col-span-4 text-right">HASH</div>
                </div>
                <div id="history-list" class="max-h-[380px] overflow-y-auto divide-y divide-zinc-800"></div>
            </div>
        </div>

        <!-- FOOTER INFO -->
        <div class="text-center text-[10px] text-zinc-500 mt-8 px-4">
            Game runs automatically like real BC.Game • Watch even if you don't bet • Real FOMO 🔥
        </div>
    </div>

    <script>
        // ====================== STATE ======================
        let balance = 2148.67;
        let currentBet = 100;
        let gameState = "BETTING"; // BETTING | FLYING | CRASHED
        let countdown = 5;
        let countdownInterval = null;
        let hasBet = false;
        let betAmountPlaced = 0;
        let cashedOut = false;
        let multiplier = 1.00;
        let crashPoint = 0;
        let isFlying = false;
        let startTime = 0;
        let graphPoints = [];
        let animationFrame = null;
        let nextGameId = 9032253;

        let historyData = [
            { id: "9032252", mult: 1.02, hash: "baaf37d2525d..." },
            { id: "9032251", mult: 28.20, hash: "eb6bef3e55b0..." },
            { id: "9032250", mult: 8.45, hash: "208525d1f9d53..." },
            { id: "9032249", mult: 1.02, hash: "442b15ed0072..." },
            { id: "9032248", mult: 1.59, hash: "5b223ccb9051..." }
        ];

        // DOM elements
        const canvas = document.getElementById("graph-canvas");
        const ctx = canvas.getContext("2d");
        const multEl = document.getElementById("mult-value");
        const statusText = document.getElementById("status-text");
        const subStatus = document.getElementById("sub-status");
        const countdownEl = document.getElementById("countdown");
        const actionBtn = document.getElementById("action-btn");
        const balanceEl = document.getElementById("balance");

        // ====================== REALISTIC CRASH GENERATOR (same as BC.Game) ======================
        function generateCrashPoint() {
            const roll = Math.random();
            if (roll < 0.53) return parseFloat((1 + Math.random() * 0.99).toFixed(2));
            if (roll < 0.78) return parseFloat((2 + Math.random() * 7.99).toFixed(2));
            if (roll < 0.93) return parseFloat((10 + Math.random() * 19.99).toFixed(2));
            return parseFloat((30 + Math.random() * 180).toFixed(2));
        }

        function generateFakeHash() {
            const chars = "abcdef0123456789";
            let hash = "";
            for (let i = 0; i < 13; i++) hash += chars[Math.floor(Math.random() * chars.length)];
            return hash + "...";
        }

        // ====================== GRAPH ======================
        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = "#27272a";
            ctx.lineWidth = 1.5;
            for (let i = 1; i < 6; i++) {
                const y = (canvas.height / 6) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            if (graphPoints.length < 2) return;

            const maxMult = Math.max(...graphPoints.map(p => p.y)) * 1.15 || 5;
            ctx.strokeStyle = "#22c55e";
            ctx.lineWidth = 7;
            ctx.shadowBlur = 30;
            ctx.shadowColor = "#22c55e";
            ctx.beginPath();

            for (let i = 0; i < graphPoints.length; i++) {
                const p = graphPoints[i];
                const x = (p.x / 420) * canvas.width;
                const y = canvas.height - (p.y / maxMult) * (canvas.height * 0.82);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();

            // End dot
            const last = graphPoints[graphPoints.length - 1];
            const lx = (last.x / 420) * canvas.width;
            const ly = canvas.height - (last.y / maxMult) * (canvas.height * 0.82);
            ctx.fillStyle = "#22c55e";
            ctx.beginPath();
            ctx.arc(lx, ly, 11, 0, Math.PI * 2);
            ctx.fill();
        }

        // ====================== ANIMATION ======================
        function gameLoop() {
            if (!isFlying) return;

            const elapsed = (Date.now() - startTime) / 1000;
            multiplier = Math.max(1, 1 + (elapsed * 1.75)); // feels exactly like real Crash speed

            multEl.textContent = multiplier.toFixed(2);
            multEl.className = `multiplier ${multiplier < 2 ? 'text-orange-400' : multiplier < 10 ? 'text-emerald-400' : 'text-yellow-300'}`;

            graphPoints.push({ x: elapsed * 38, y: multiplier });
            drawGraph();

            if (multiplier >= crashPoint) {
                handleCrash();
                return;
            }

            animationFrame = requestAnimationFrame(gameLoop);
        }

        // ====================== AUTO ROUND CYCLE (REAL BC.GAME STYLE) ======================
        function startBettingPhase() {
            gameState = "BETTING";
            countdown = 5;
            hasBet = false;
            cashedOut = false;
            multiplier = 1.00;
            graphPoints = [];
            isFlying = false;

            multEl.textContent = "1.00";
            updateUI();
            startCountdownTimer();
        }

        function startCountdownTimer() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    startFlying();
                }
            }, 1000);
        }

        function startFlying() {
            gameState = "FLYING";
            isFlying = true;
            crashPoint = generateCrashPoint();
            startTime = Date.now();
            graphPoints = [{ x: 0, y: 1 }];
            multiplier = 1.00;

            updateUI();
            drawGraph();
            gameLoop();
        }

        function handleCrash() {
            cancelAnimationFrame(animationFrame);
            isFlying = false;
            gameState = "CRASHED";

            // Show crash
            multEl.textContent = crashPoint.toFixed(2);
            multEl.className = "multiplier text-red-500";

            statusText.innerHTML = `💥 CRASHED @ <span class="text-red-500">${crashPoint.toFixed(2)}x</span>`;
            subStatus.textContent = "Next round starting soon...";

            // Add to history (real multiplier that flew)
            addToHistory(crashPoint);

            // If bet was placed and not cashed out → lose
            if (hasBet && !cashedOut) {
                subStatus.innerHTML += `<br><span class="text-red-400 text-xs">You lost ${betAmountPlaced} NGN</span>`;
            }

            actionBtn.textContent = "WAIT...";

            // Auto start next betting phase after 3 seconds (real feel)
            setTimeout(() => {
                startBettingPhase();
            }, 3000);
        }

        function cashOut() {
            if (!isFlying || !hasBet || cashedOut) return;
            
            cancelAnimationFrame(animationFrame);
            isFlying = false;
            cashedOut = true;
            gameState = "CRASHED";

            const winnings = betAmountPlaced * multiplier;
            balance += winnings;
            balanceEl.textContent = balance.toFixed(2);

            statusText.innerHTML = `✅ CASHED OUT @ <span class="text-emerald-400">${multiplier.toFixed(2)}x</span>`;
            subStatus.innerHTML = `+${(winnings - betAmountPlaced).toFixed(2)} NGN`;

            addToHistory(multiplier); // record the cashout point for history

            actionBtn.textContent = "WAIT...";

            setTimeout(() => {
                startBettingPhase();
            }, 2500);
        }

        // ====================== HISTORY ======================
        function addToHistory(mult) {
            const newEntry = {
                id: nextGameId++,
                mult: parseFloat(mult.toFixed(2)),
                hash: generateFakeHash()
            };
            historyData.unshift(newEntry);
            if (historyData.length > 12) historyData.pop();

            renderRecentBar();
            renderHistoryList();
        }

        function renderRecentBar() {
            const container = document.getElementById("recent-bar");
            container.innerHTML = "";
            const recent = historyData.slice(0, 5);

            recent.forEach(item => {
                const colorClass = item.mult < 2 ? "text-orange-400" : item.mult < 10 ? "text-emerald-400" : "text-yellow-300";
                const dotClass = item.mult < 2 ? "bg-orange-400" : item.mult < 10 ? "bg-emerald-400" : "bg-yellow-300";
                
                const div = document.createElement("div");
                div.className = "flex flex-col items-center min-w-[58px]";
                div.innerHTML = `
                    <div class="w-6 h-6 rounded-2xl ${dotClass} flex items-center justify-center dot mb-1 shadow-xl">
                        <span class="text-[10px] text-black font-black">•</span>
                    </div>
                    <span class="\( {colorClass} text-xs font-bold"> \){item.mult}x</span>
                `;
                container.appendChild(div);
            });
        }

        function renderHistoryList() {
            const container = document.getElementById("history-list");
            container.innerHTML = "";
            historyData.forEach(item => {
                const color = item.mult < 2 ? "text-orange-400" : item.mult < 10 ? "text-emerald-400" : "text-yellow-300";
                const dot = item.mult < 2 ? "bg-orange-400" : item.mult < 10 ? "bg-emerald-400" : "bg-yellow-300";

                const row = document.createElement("div");
                row.className = "grid grid-cols-12 py-4 hover:bg-zinc-800/60 px-2 transition-colors";
                row.innerHTML = `
                    <div class="col-span-5 flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full ${dot}"></div>
                        <span class="font-mono">${item.id}</span>
                    </div>
                    <div class="col-span-3 text-center">
                        <span class="\( {color} text-2xl font-bold"> \){item.mult}x</span>
                    </div>
                    <div class="col-span-4 font-mono text-xs text-zinc-500 text-right">${item.hash}</div>
                `;
                container.appendChild(row);
            });
        }

        function toggleHistory() {
            document.getElementById("history-panel").classList.toggle("hidden");
        }

        // ====================== BETTING ======================
        function placeBet() {
            if (balance < currentBet || gameState !== "BETTING") return;
            
            balance -= currentBet;
            balanceEl.textContent = balance.toFixed(2);
            hasBet = true;
            betAmountPlaced = currentBet;
            updateUI();
        }

        function handleAction() {
            if (gameState === "BETTING") {
                if (!hasBet) placeBet();
            } 
            else if (gameState === "FLYING" && hasBet && !cashedOut) {
                cashOut();
            }
        }

        function updateBetDisplay() {
            currentBet = Math.max(10, parseFloat(document.getElementById("bet-input").value) || 100);
            document.getElementById("bet-amount-display").textContent = currentBet;
        }

        function quickBet(add) {
            if (add === 500) currentBet = Math.floor(balance * 0.85);
            else currentBet = Math.min(Math.max(10, currentBet + add), Math.floor(balance));
            document.getElementById("bet-input").value = currentBet;
            document.getElementById("bet-amount-display").textContent = currentBet;
        }

        function updateUI() {
            // Button text
            if (gameState === "BETTING") {
                actionBtn.textContent = hasBet ? "BET PLACED ✓" : "PLACE BET";
                actionBtn.className = `mt-6 w-full py-7 text-2xl font-bold rounded-3xl transition-all active:scale-95 ${hasBet ? 'bg-emerald-600 text-white' : 'bg-emerald-500 text-black'}`;
                
                statusText.innerHTML = `NEXT ROUND IN <span id="countdown" class="countdown text-emerald-400">${countdown}</span>`;
                subStatus.textContent = hasBet ? "You're in for this round!" : "Place your bet now";
            } 
            else if (gameState === "FLYING") {
                actionBtn.textContent = hasBet && !cashedOut ? "CASH OUT NOW" : "WATCHING";
                actionBtn.className = `mt-6 w-full py-7 text-2xl font-bold rounded-3xl transition-all active:scale-95 ${hasBet && !cashedOut ? 'bg-red-500 text-white' : 'bg-zinc-700 text-zinc-400'}`;
                
                statusText.textContent = "FLYING...";
                subStatus.textContent = hasBet ? "Tap to cash out!" : "You missed this one";
            } 
            else if (gameState === "CRASHED") {
                actionBtn.textContent = "WAIT...";
                actionBtn.className = "mt-6 w-full py-7 text-2xl font-bold rounded-3xl bg-zinc-700 text-zinc-400";
            }
        }

        // ====================== SHAKE FOR FUN ======================
        function enableShake() {
            let lastX = 0;
            window.addEventListener('devicemotion', (e) => {
                if (!e.accelerationIncludingGravity || gameState === "FLYING") return;
                const delta = Math.abs(e.accelerationIncludingGravity.x - lastX);
                if (delta > 13) {
                    if (gameState === "BETTING") {
                        clearInterval(countdownInterval);
                        startFlying();
                    }
                }
                lastX = e.accelerationIncludingGravity.x;
            });
        }

        // ====================== INIT ======================
        function init() {
            balanceEl.textContent = balance.toFixed(2);
            document.getElementById("bet-input").value = currentBet;
            document.getElementById("bet-amount-display").textContent = currentBet;

            renderRecentBar();
            renderHistoryList();
            drawGraph();

            // START THE REAL GAME
            startBettingPhase();

            enableShake();

            // Keyboard (N = force next round)
            document.addEventListener("keydown", e => {
                if (e.key.toLowerCase() === "n") {
                    if (gameState === "BETTING") {
                        clearInterval(countdownInterval);
                        startFlying();
                    }
                }
            });

            console.log("%c✅ FULL REAL BC.GAME CRASH READY\nRounds run automatically\nWatch even when you don't bet\nPure FOMO mode activated 👀", "color:#22c55e; font-size:14px");
        }

        window.onload = init;
    </script>
</body>
</html>
